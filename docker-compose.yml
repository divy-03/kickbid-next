services:
  app:
    build: .
    container_name: kickbid_app
    restart: always
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    env_file:
      - .env.development
    environment:
      DATABASE_URL: postgresql://postgres:password@kickbid_db:5432/kickbid
      NODE_ENV: development
    depends_on:
      - kickbid_db
    command: sh -c "bunx --bun prisma generate && bun run dev"

  kickbid_db:
    image: postgres:17
    container_name: kickbid_pg
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kickbid
    ports:
      - "5432:5432"
    volumes:
      - kickbid_data:/var/lib/postgresql/data

volumes:
  kickbid_data:

